<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="最新我的世界服务器列表，提供Minecraft服务器IP地址、在线人数、服务器状态和MOTD信息，帮助玩家快速找到优质MC服务器。">
    <meta name="keywords" content="我的世界服务器,Minecraft服务器列表,MC服务器IP,我的世界联机,Minecraft多人游戏,MC服务器在线人数">
    <meta name="author" content="我的世界服务器列表">
    <meta property="og:title" content="我的世界服务器列表 | 最新Minecraft服务器信息">
    <meta property="og:description" content="最新我的世界服务器列表，提供Minecraft服务器IP地址、在线人数和服务器状态信息">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://wdsjfwq.github.io">
    <title>我的世界服务器列表 | 最新Minecraft服务器IP和在线人数查询</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
        body{background:linear-gradient(135deg,#1a0a2e,#2d1b4e 40%,#1a0a2e);color:#e8e0f0;line-height:1.6;min-height:100vh}
        .container{max-width:1200px;margin:0 auto;padding:20px}
        header{background:linear-gradient(135deg,#6a1b9a,#8e24aa);color:#fff;padding:35px 0;text-align:center;border-radius:12px;margin-bottom:30px;box-shadow:0 4px 20px rgba(138,43,226,.3)}
        h1{font-size:2.5rem;margin-bottom:10px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
        .intro{background:rgba(45,27,78,.6);backdrop-filter:blur(10px);padding:20px;border-radius:12px;margin-bottom:30px;box-shadow:0 2px 12px rgba(0,0,0,.2);border:1px solid rgba(155,89,182,.3)}
        .intro p{margin-bottom:15px}
        .server-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
        .server-card{background:rgba(45,27,78,.7);backdrop-filter:blur(10px);border-radius:12px;overflow:hidden;border:1px solid rgba(155,89,182,.25);transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;display:flex;flex-direction:column}
        .server-card:hover{transform:translateY(-6px);box-shadow:0 10px 30px rgba(138,43,226,.35);border-color:rgba(186,104,200,.6)}
        .server-top{display:flex;align-items:center;gap:14px;padding:16px;border-bottom:1px solid rgba(155,89,182,.2)}
        .server-logo{width:56px;height:56px;border-radius:12px;object-fit:cover;background:linear-gradient(135deg,#7b1fa2,#9c27b0);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:1.1rem;flex-shrink:0;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)}
        .server-name{flex:1;min-width:0}
        .server-ip{font-weight:bold;font-size:1rem;color:#e1bee7;display:flex;justify-content:space-between;align-items:center;gap:8px;word-break:break-all}
        .copy-ip{background:linear-gradient(135deg,#7b1fa2,#9c27b0);border:none;color:#fff;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:.78rem;transition:all .2s;flex-shrink:0;white-space:nowrap}
        .copy-ip:hover{background:linear-gradient(135deg,#9c27b0,#ba68c8);box-shadow:0 2px 8px rgba(156,39,176,.4)}
        .server-body{padding:16px;flex:1}
        .motd{font-family:'Minecraft',monospace;white-space:pre-wrap;line-height:1.5;color:#d1c4e9;font-size:.88rem;min-height:2.8em}
        .server-stats{display:flex;gap:12px;padding:12px 16px;border-top:1px solid rgba(155,89,182,.2);font-size:.82rem;flex-wrap:wrap}
        .stat-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;background:rgba(155,89,182,.15)}
        .online{color:#ce93d8;font-weight:bold}
        .offline{color:#ef5350;font-weight:bold}
        .stat-ping{color:#b39ddb}
        .error{text-align:center;padding:50px;font-size:1.2rem;color:#ef5350}
        .toast{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#7b1fa2,#9c27b0);color:#fff;padding:12px 24px;border-radius:8px;box-shadow:0 4px 15px rgba(138,43,226,.4);opacity:0;transition:opacity .3s ease;z-index:999}
        .toast.show{opacity:1}
        .skeleton-card{background:rgba(45,27,78,.7);border-radius:12px;overflow:hidden;border:1px solid rgba(155,89,182,.2)}
        .skeleton-top{display:flex;align-items:center;gap:14px;padding:16px;border-bottom:1px solid rgba(155,89,182,.15)}
        .skeleton-logo{width:56px;height:56px;border-radius:12px;flex-shrink:0}
        .skeleton-line{height:13px;border-radius:6px;margin-bottom:8px;flex:1}
        .skeleton-line.short{width:45%}
        .skeleton-body{padding:16px}
        .skeleton-text{height:10px;border-radius:5px;margin-bottom:8px}
        .skeleton-text:nth-child(1){width:92%}
        .skeleton-text:nth-child(2){width:68%}
        .skeleton-text:nth-child(3){width:55%}
        .skeleton-stats{display:flex;gap:12px;padding:12px 16px}
        .skeleton-badge{height:22px;width:80px;border-radius:20px}
        @keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
        .skeleton-logo,.skeleton-line,.skeleton-text,.skeleton-badge{background:linear-gradient(90deg,rgba(106,27,154,.3) 25%,rgba(156,81,200,.5) 50%,rgba(106,27,154,.3) 75%);background-size:400px 100%;animation:shimmer 1.5s infinite}
        .footer-links{background:rgba(45,27,78,.6);backdrop-filter:blur(10px);padding:25px 20px;border-radius:12px;margin-top:30px;text-align:center;border:1px solid rgba(155,89,182,.3)}
        .footer-links h3{font-size:1.1rem;margin-bottom:15px;color:#ce93d8}
        .footer-links-list{display:flex;flex-wrap:wrap;justify-content:center;gap:12px 20px;list-style:none}
        .footer-links-list a{color:#ba68c8;text-decoration:none;font-size:.95rem;transition:color .2s}
        .footer-links-list a:hover{color:#e1bee7;text-decoration:underline}
        @media(max-width:768px){.server-list{grid-template-columns:1fr}h1{font-size:1.8rem}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>我的世界服务器列表</h1>
            <p>发现并连接最佳的Minecraft服务器</p>
        </header>
        
        <section class="intro">
            <h2>什么是我的世界服务器？</h2>
            <p>我的世界(Minecraft)服务器是由玩家或组织搭建的多人游戏环境，允许来自世界各地的玩家在同一个虚拟世界中互动、建造和冒险。</p>
            <p>服务器可以是原版的生存模式，也可以是包含各种插件和模组的特殊玩法，如RPG、小游戏、建筑创作等。</p>
            <p>通过我们的服务器列表，您可以轻松找到适合您游戏风格的Minecraft服务器，获取服务器IP地址并直接连接。</p>
        </section>
        
        <div id="server-container"></div>
        <div id="toast" class="toast">IP地址已复制!</div>
        
        <footer class="footer-links">
            <h3>友情链接</h3>
            <ul class="footer-links-list">
                <li><a href="https://www.mczfw.com/" target="_blank" rel="noopener noreferrer">我的世界找服网</a></li>
                <li><a href="https://www.minecraftservers.cn/" target="_blank" rel="noopener noreferrer">我的世界服务器查询</a></li>
                <li><a href="https://www.wdsjfwq.cn/" target="_blank" rel="noopener noreferrer">免费服务器地址</a></li>
                <li><a href="https://mc-list.cn/" target="_blank" rel="noopener noreferrer">我的世界服务器列表</a></li>
            </ul>
        </footer>
    </div>
    
    <script>
        const SkeletonCard = () => `
            <div class="skeleton-card">
                <div class="skeleton-top">
                    <div class="skeleton-logo"></div>
                    <div style="flex:1">
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line short"></div>
                    </div>
                </div>
                <div class="skeleton-body">
                    <div class="skeleton-text"></div>
                    <div class="skeleton-text"></div>
                    <div class="skeleton-text"></div>
                </div>
                <div class="skeleton-stats">
                    <div class="skeleton-badge"></div>
                    <div class="skeleton-badge"></div>
                </div>
            </div>`;
        
        const ServerCard = (server) => {
            const logo = server.logo
                ? `<img src="${server.logo}" alt="服务器图标" class="server-logo">`
                : `<div class="server-logo">MC</div>`;
            const motd = server.motd
                ? `<div class="motd">${server.motd}</div>`
                : `<div class="motd">暂无服务器描述</div>`;
            const players = server.p !== undefined
                ? `<span class="stat-badge">在线: <span class="online">${server.p}</span></span>`
                : `<span class="stat-badge">在线: <span class="offline">-</span></span>`;
            const ping = server.ping !== undefined
                ? `<span class="stat-badge stat-ping">延迟: ${server.ping}ms</span>`
                : `<span class="stat-badge stat-ping">延迟: -</span>`;
            return `
            <div class="server-card">
                <div class="server-top">
                    ${logo}
                    <div class="server-name">
                        <div class="server-ip">
                            ${server.ip}
                            <button class="copy-ip" data-ip="${server.ip}">复制IP</button>
                        </div>
                    </div>
                </div>
                <div class="server-body">${motd}</div>
                <div class="server-stats">${players}${ping}</div>
            </div>`;
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('server-container');
            const toast = document.getElementById('toast');
            const list = document.createElement('div');
            list.className = 'server-list';
            list.innerHTML = Array.from({length: 6}, SkeletonCard).join('');
            container.appendChild(list);
            
            fetch('https://list.mczfw.com/api')
                .then(res => {
                    if (!res.ok) throw new Error('网络响应不正常');
                    return res.json();
                })
                .then(data => {
                    if (!data || data.length === 0) {
                        container.innerHTML = '<div class="error">没有找到可用的服务器</div>';
                        return;
                    }
                    list.innerHTML = data.filter(s => s.ip).map(ServerCard).join('');
                    list.addEventListener('click', (e) => {
                        const btn = e.target.closest('.copy-ip');
                        if (!btn) return;
                        navigator.clipboard.writeText(btn.dataset.ip).then(() => {
                            toast.classList.add('show');
                            setTimeout(() => toast.classList.remove('show'), 2000);
                        });
                    });
                })
                .catch(err => {
                    container.innerHTML = `<div class="error">加载服务器列表失败: ${err.message}</div>`;
                });
        });
    </script>
</body>
</html>
